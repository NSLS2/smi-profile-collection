[workspace]
channels = ["conda-forge"]
name = "smi-profile-collection"
platforms = ["linux-64"]
version = "2026.2.0"

[system-requirements]
libc = "2.17"

[activation.env]
REDIS_HOST="xf12id2-smi-redis1.nsls2.bnl.gov"

[feature.profile.dependencies]
bluesky-base = "==1.15.0"
bluesky-queueserver = "*"
matplotlib-base= ">=3.10"
networkx = ">=3.4.2,<4"
nslsii = "==0.11.9"
numpy = "*"
ophyd = ">=1.11.2"
pyepics = "*"
python = ">=3.12,<3.13"
semver = ">=3.0.4,<4"
tiled-client = "==0.2.9"
hdf5-external-filter-plugins = ">=0.1.0,<0.2"
blosc-hdf5-plugin = ">=1.0.1,<2"
databroker = "==2.0.0"
epicscorelibs = ">=7.0.7.99.1.1,<8"
bluesky-tiled-plugins = "==2.0.2"
ophyd-async = ">=0.13.7,<0.14"
openai = ">=2.15.0,<3"
anthropic = ">=0.77.0,<0.78"
paramiko = ">=4.0.0,<5"
boto3 = "==1.42.44"
pyautogen = "*"
ipykernel = "*"
jupyter_client = "*"
qtpy = "*"


[feature.profile.pypi-dependencies]
pvxslibs = ">=1.3.2, <2"
ag2 = { version = "*", extras = ["jupyter-executor", "openai"] }

[feature.qs.dependencies]
bluesky-queueserver = "*"
bluesky-httpserver = "*"

[feature.qs.tasks]
# This section needs some development work to understand the best way to
# thread the required configuration through both the task and files checked into
# the profile.  These will interact with the ansible roles for pushing out the
# systemd units.
#
# NOTE: this bluesky-queueserver (0.0.23) uses --startup-dir (not the old
# --profile-dir); the profile entry point is startup/startup.py.  qs-backend
# additionally needs a queue/state Redis on localhost:6379 (separate from the
# metadata Redis) and a user_group_permissions.yaml before clients can submit
# plans -- see smi-plans/docs/STARTUP_RESTRUCTURE_PLAN.md (§7.3).
qs-backend = "start-re-manager --startup-dir=startup --ignore-invalid-plans=ON"
qs-server = "uvicorn --host localhost --port 60610 bluesky_httpserver.server:app"
# Headless QS-readiness smoke test: loads the profile exactly as the worker does
# (no IPython) and writes the plan/device list. Good for catching worker-load or
# plan-signature problems without standing up the full manager + Redis.
qs-list = "qserver-list-plans-devices --startup-dir=startup --file-dir=startup --ignore-invalid-plans=ON"


[feature.terminal.dependencies]
ipython = ">=9.5.0"
pyside6 = "*"
numpy = ">2"


[feature.terminal.tasks]
start = "unset SESSION_MANAGER PYTHONPATH && MPLBACKEND=qtagg ipython --profile-dir=."
# Like `start`, but first SETS the persistent Redis beam_down flag (db=3,
# 'swaxsstatus:beam_down') so the suspenders are BUILT but NOT enabled -- you can
# test/restart without running turn_off_suspenders() each time (use turn_on_suspenders()
# when the beam returns).  The flag persists across restarts AND reaches the queueserver
# worker on its separate host; clear it with the `beam-up` task (or clear_beam_down() in a
# session).
start-beamdown = "PYTHONPATH=src python -m smi_beamline.plans.re_status set-beam-down --reason 'start-beamdown task' && unset SESSION_MANAGER PYTHONPATH && MPLBACKEND=qtagg ipython --profile-dir=."
# Set / clear the persistent Redis beam_down flag WITHOUT launching a session (handy for the
# queueserver host, or to arm/disarm beam-down ahead of a restart).
beam-down = "PYTHONPATH=src python -m smi_beamline.plans.re_status set-beam-down"
beam-up = "PYTHONPATH=src python -m smi_beamline.plans.re_status clear-beam-down"
beam-status = "PYTHONPATH=src python -m smi_beamline.plans.re_status status"
pvs = "ipython --profile-dir=. -c 'get_pv_types(); exit()'"


[feature.test.dependencies]
pytest = ">=7"
caproto = "*"

[feature.test.tasks]
# Hardware-free tiers (unit + sim). Uses ophyd.sim.make_fake_device; EPICS CA is
# disabled so no real channel access is attempted (conftest also locks it down).
test = { cmd = "pytest -m 'not hardware'", env = { EPICS_CA_AUTO_ADDR_LIST = "NO", EPICS_CA_ADDR_LIST = "127.0.0.1" } }
# Just the pure-code tier.
test-unit = { cmd = "pytest -m unit", env = { EPICS_CA_AUTO_ADDR_LIST = "NO", EPICS_CA_ADDR_LIST = "127.0.0.1" } }
# Just the fake-device tier.
test-sim = { cmd = "pytest -m sim", env = { EPICS_CA_AUTO_ADDR_LIST = "NO", EPICS_CA_ADDR_LIST = "127.0.0.1" } }
# Integration tier: spin up LOCAL, loopback-only fake caproto IOCs and drive the real
# device logic against motors that move at finite speed. CA is pinned to loopback so it
# only ever talks to the local IOC (never the beamline).
test-iocs = { cmd = "pytest -m integration --run-iocs", env = { EPICS_CA_AUTO_ADDR_LIST = "NO", EPICS_CA_ADDR_LIST = "127.0.0.1", EPICS_CAS_INTF_ADDR_LIST = "127.0.0.1", EPICS_CAS_BEACON_ADDR_LIST = "127.0.0.1" } }
# HARDWARE tier -- connects to REAL PVs. Only run this ON the beamline.
# Note: no CA lock-down here on purpose; opt-in via --run-hardware.
test-hardware = "pytest --run-hardware -m hardware"

[environments]
terminal = {features=["profile", "terminal"], solve-group="profile"}
test = {features=["profile", "test"], solve-group="profile"}
qs = {features=["profile", "qs"], solve-group="profile"}
qsgui = {features=["profile", "qsgui"], solve-group="profile"}


[feature.qsgui.tasks]
qserver-gui = "queue-monitor --http-server-uri https://xf12id2-smi-qs1.nsls2.bnl.gov"

[feature.qsgui.dependencies]
bluesky-widgets = ">=0.0.17,<0.0.18"
pyqt = ">=5.15.11,<6"
qtpy = ">=2.4.3,<3"
bluesky-httpserver = ">=0.0.12,<0.0.13"
